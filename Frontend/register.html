<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Create your Happy Tails account to start your dog adoption journey."/>
  <title>Register – Happy Tails</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🐾</text></svg>"/>
  <style>
    .auth-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 40%, #fed7aa 100%);
      position: relative;
      overflow: hidden;
    }
    .auth-bg::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(251,146,60,0.2) 0%, transparent 70%);
      animation: floatBlob 9s ease-in-out infinite alternate;
    }
    .auth-bg::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -10%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(253,186,116,0.25) 0%, transparent 70%);
      animation: floatBlob 11s ease-in-out infinite alternate-reverse;
    }
    .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: #78716c; transition: color 0.2s; user-select: none; }
    .password-toggle:hover { color: #f97316; }
    .strength-bar { height: 4px; border-radius: 2px; transition: all 0.3s ease; }
    body.dark .auth-card { background: rgba(28,25,23,0.92) !important; border-color: rgba(249,115,22,0.2) !important; }
  </style>
</head>
<body class="bg-orange-50">

<div id="toast-container"></div>

<!-- ── NAVBAR ── -->
<nav class="px-4 sm:px-8 py-4">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-stone-800">
      <span class="text-2xl">🐾</span>
      <span>Happy<span class="text-orange-500">Tails</span></span>
    </a>
    <div class="flex items-center gap-3">
      <button id="dark-toggle" class="w-9 h-9 rounded-full bg-orange-100 hover:bg-orange-200 flex items-center justify-center transition-all">
        <span id="dark-icon">🌙</span>
      </button>
      <a href="dogs.html" class="btn-secondary" style="padding:0.55rem 1.3rem;font-size:0.85rem">Browse Dogs</a>
    </div>
  </div>
</nav>

<!-- ── REGISTER PAGE ── -->
<div class="auth-bg px-4 py-8 flex items-center justify-center" style="min-height:calc(100vh - 80px)">
  <div class="w-full max-w-md relative z-10 fade-in">

    <!-- Card -->
    <div class="auth-card glass rounded-3xl p-8 sm:p-10 shadow-2xl">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="text-5xl mb-2 animate-pulse">✨</div>
        <h1 class="text-3xl font-extrabold text-stone-800" style="font-family:'Poppins',sans-serif">
          Create<span class="text-orange-500"> Account</span>
        </h1>
        <p class="text-stone-500 text-sm mt-1">Join the family and start adopting</p>
      </div>

      <!-- ── REGISTER FORM ── -->
      <form id="register-form" onsubmit="handleRegister(event)" novalidate>

        <!-- Name -->
        <div class="input-group mb-4">
          <input id="reg-name" type="text" placeholder=" " class="form-input" autocomplete="name"/>
          <label for="reg-name">👤 Full Name</label>
          <p id="reg-name-err" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Email -->
        <div class="input-group mb-4">
          <input id="reg-email" type="email" placeholder=" " class="form-input" autocomplete="email"/>
          <label for="reg-email">📧 Email Address</label>
          <p id="reg-email-err" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Password -->
        <div class="input-group mb-2">
          <div class="relative">
            <input id="reg-password" type="password" placeholder=" " class="form-input" style="padding-right:3.5rem" oninput="checkStrength(this.value)" autocomplete="new-password"/>
            <span class="password-toggle" onclick="togglePassword('reg-password', this)">👁️</span>
          </div>
          <label for="reg-password">🔒 Password</label>
          <p id="reg-pass-err" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Strength bar -->
        <div class="mb-5">
          <div class="flex gap-1 mb-1">
            <div id="s1" class="strength-bar flex-1 bg-stone-200"></div>
            <div id="s2" class="strength-bar flex-1 bg-stone-200"></div>
            <div id="s3" class="strength-bar flex-1 bg-stone-200"></div>
            <div id="s4" class="strength-bar flex-1 bg-stone-200"></div>
          </div>
          <p id="strength-label" class="text-xs text-stone-400"></p>
        </div>

        <!-- Terms -->
        <label class="flex items-start gap-2 mb-8 cursor-pointer">
          <input id="reg-terms" type="checkbox" class="mt-1 accent-orange-500 w-4 h-4 rounded"/>
          <span class="text-stone-500 text-xs leading-relaxed">I agree to the <a href="contact.html?subject=Terms%20of%20Service" class="text-orange-500 hover:underline">Terms of Service</a> and <a href="contact.html?subject=Privacy%20Policy" class="text-orange-500 hover:underline">Privacy Policy</a></span>
        </label>
        <p id="reg-terms-err" class="text-red-500 text-xs -mt-6 mb-4 hidden"></p>

        <!-- Submit -->
        <button id="reg-btn" type="submit" class="btn-primary w-full justify-center text-lg py-4 transition-all transform hover:scale-[1.02] active:scale-95 shadow-xl">
          <span id="reg-btn-text">Create Account 🐾</span>
          <span id="reg-spinner" class="hidden ml-2" style="width:20px;height:20px;border:3px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite"></span>
        </button>

        <p class="text-center text-stone-500 text-sm mt-8">
          Already have an account?
          <a href="login.html" class="text-orange-500 font-bold hover:underline">Sign in</a>
        </p>
      </form>

    </div><!-- /card -->

    <!-- Trust -->
    <div class="flex justify-center gap-6 mt-8 text-stone-400 text-xs">
      <span>🔒 Secure Signup</span>
      <span>🐾 Verified Shelters</span>
      <span>⭐ 4.9/5 Rating</span>
    </div>
  </div>
</div>

<div id="public-footer"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/footer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Utils.initPage();
  // Show hero fade-in
  setTimeout(() => document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible')), 150);

  // If already logged in
  if (API.getToken()) {
    const user = API.getUser();
    Utils.showToast('You already have an account! 🐾', 'info');
    setTimeout(() => {
      if (user && user.role === 'admin') {
        window.location.href = 'admin/dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    }, 1500);
  }
});

// ── Password Toggle ─────────────────────────────────────────
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const isPass = input.type === 'password';
  input.type = isPass ? 'text' : 'password';
  btn.textContent = isPass ? '🙈' : '👁️';
}

// ── Password Strength ───────────────────────────────────────
function checkStrength(val) {
  const bars   = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
  const label  = document.getElementById('strength-label');
  const colors = ['#dc2626','#d97706','#16a34a','#15803d'];
  const labels = ['Weak','Fair','Good','Strong'];
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  bars.forEach((b,i) => { b.style.background = i < score ? colors[Math.min(score-1,3)] : '#e7e5e4'; });
  label.textContent = val ? labels[Math.min(score-1,3)] || 'Weak' : '';
  label.style.color = score > 0 ? colors[Math.min(score-1,3)] : '#a8a29e';
}

// ── Validation Helpers ──────────────────────────────────────
function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.remove('hidden');
}
function clearErr(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('hidden');
}
function setInputState(id, state) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('error','success');
  if (state) el.classList.add(state);
}

// ── Register Handler ────────────────────────────────────────
async function handleRegister(e) {
  e.preventDefault();
  ['reg-name-err','reg-email-err','reg-pass-err','reg-terms-err'].forEach(clearErr);

  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const terms    = document.getElementById('reg-terms').checked;
  let valid = true;

  if (!name || name.length < 2) {
    showErr('reg-name-err', 'Please enter your full name'); setInputState('reg-name','error'); valid = false;
  } else { setInputState('reg-name','success'); }

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showErr('reg-email-err', 'Please enter a valid email'); setInputState('reg-email','error'); valid = false;
  } else { setInputState('reg-email','success'); }

  if (!password || password.length < 8) {
    showErr('reg-pass-err', 'Password must be at least 8 characters'); setInputState('reg-password','error'); valid = false;
  } else { setInputState('reg-password','success'); }

  if (!terms) {
    showErr('reg-terms-err', 'Please accept the terms to continue'); valid = false;
  }

  if (!valid) return;

  // Loading
  const btn = document.getElementById('reg-btn');
  const btnText = document.getElementById('reg-btn-text');
  const spinner = document.getElementById('reg-spinner');

  btn.disabled = true;
  btnText.textContent = 'Creating account...';
  spinner.classList.remove('hidden');

  try {
    await API.registerUser({ name, email, password });
    Utils.showToast('Welcome to the family! Account created! 🐾', 'success');
    setTimeout(() => window.location.href = 'login.html', 2000);
  } catch (err) {
    Utils.showToast(err.message || 'Registration failed. Try again.', 'error');
    if (err.message?.toLowerCase().includes('email')) setInputState('reg-email','error');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Create Account 🐾';
    spinner.classList.add('hidden');
  }
}
</script>
</body>
</html>
